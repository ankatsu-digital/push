<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>アンカツ＋ 通知管理</title>
</head>

<body>

<h1>アンカツ＋ 通知送信</h1>

<label>
タイトル
</label><br>
<input id="title" value="アンカツ＋"><br><br>

<label>
本文
</label><br>
<textarea id="body">
新しい記事が公開されました
</textarea>

<br><br>

<button onclick="sendNotification()">
通知を送信
</button>


<script>

async function sendNotification(){

 const title =
 document.getElementById("title").value;

 const body =
 document.getElementById("body").value;


 const response = await fetch(
 "ここにCloud FunctionsのURL",
 {
  method:"POST",
  headers:{
   "Content-Type":"application/json"
  },
  body:JSON.stringify({
   title:title,
   body:body
  })
 });


 const result = await response.text();

 alert(result);

}

</script>

</body>
</html>
