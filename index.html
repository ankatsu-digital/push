<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>アンカツ＋ 通知登録</title>

</head>


<body>


<h1>🏯 ンカツ＋</h1>

<p>
プッシュ通知を受け取る
</p>


<button id="notifyBtn">
通知を許可する
</button>


<p id="status"></p>



<script type="module">


// Firebase

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";


import {
 getMessaging,
 getToken
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging.js";



// Firebase設定

const firebaseConfig = {

  apiKey: "AIzaSyCzNeQzzoUuMVhZEzE9IEZ8WgVBcTyNuHc",

  authDomain: "test-54a1b.firebaseapp.com",

  projectId: "test-54a1b",

  storageBucket: "test-54a1b.firebasestorage.app",

  messagingSenderId: "401926525341",

  appId: "1:401926525341:web:078a2f16ea8219799e9f74",

  measurementId: "G-MC4CGYGMX2"

};



// Firebase初期化

const app =
initializeApp(firebaseConfig);


// Firebase Messaging

const messaging =
getMessaging(app);




// GAS URL

const GAS_URL =
"https://script.google.com/macros/s/AKfycbzqsZ9rI_fYsrijPqj80so1sXpQhjI-BopgPhlR5QDWejyaH1pF0RSa2RUQdS13Owyiww/exec";





document
.getElementById("notifyBtn")
.onclick = async()=>{


try{


// 通知許可

const permission =
await Notification.requestPermission();



if(permission !== "granted"){


document
.getElementById("status")
.innerHTML =
"通知が許可されませんでした";


return;

}





// FCMトークン取得

const token =
await getToken(
messaging,
{

// Firebase Console
// Cloud Messaging
// Web Push証明書のキー

vapidKey:
"BAQyKRS74_KvlFJUrQuOAr4uH2gkUD2hgi0QyPUppPvAOOgYt29mK2GIiUhyty23qXQrWV9d352ivngWjV7FTRs"

}

);




if(!token){

throw new Error(
"FCMトークン取得失敗"
);

}




console.log(
"FCM Token:",
token
);



document
.getElementById("status")
.innerHTML =
`
登録完了<br>
通知を受け取れる状態です
`;






// GASへ保存

const result =
await fetch(
  GAS_URL,
  {
    method: "POST",
    mode: "no-cors",
    body: JSON.stringify({
      token: token,
      device: "Chrome"
    })
  }
);


body:
JSON.stringify({

token:token,

device:"Chrome"

})

}

);



console.log(
"GAS:",
await result.text()
);



}

catch(error){


console.error(error);


document
.getElementById("status")
.innerHTML =
"エラー："+error;


}



};



</script>


</body>

</html>
