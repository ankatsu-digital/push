<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>アンカツ＋</title>

</head>

<body>

<h1>🏯 アンカツ＋</h1>

<p>
通知を受け取るには許可してください。
</p>

<button id="btn">
通知を許可する
</button>

<p id="status"></p>


<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { 
getMessaging,
getToken
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging.js";


// Firebase設定
const firebaseConfig = {

 apiKey:"ここに入力",

 authDomain:"ここに入力",

 projectId:"ここに入力",

 storageBucket:"ここに入力",

 messagingSenderId:"ここに入力",

 appId:"ここに入力"

};


const app = initializeApp(firebaseConfig);

const messaging = getMessaging(app);


// ボタン

document
.getElementById("btn")
.onclick = async()=>{


try{


const permission =
await Notification.requestPermission();


if(permission !== "granted"){

document
.getElementById("status")
.innerHTML =
"通知が許可されませんでした";

return;

}



const token =
await getToken(
messaging,
{
vapidKey:
"ここにVAPID公開鍵"
}
);



console.log(token);



document
.getElementById("status")
.innerHTML =
`
通知登録完了<br><br>
${token}
`;



// GASへ保存
/*
fetch(
"GASのURL",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({

token:token,

device:
navigator.userAgent

})
}
);
*/


}catch(e){

console.error(e);

document
.getElementById("status")
.innerHTML =
"エラー:"+e;

}


};


</script>


</body>
</html>
